
service:
  name: urlshortener

app:
  port: 3000
  healthPath: /api/health
  livePath: /api/live
  basePath: /
  user: urlshortener_app

deploy:
  env: dev
  containerUid: 10005

storage:
  volumes:
    - name: urlshortener-volume
      emptyDir: {}

  volumeMounts:
    - name: urlshortener-mnt
      mountPath: /data

features:
  topVolume:
    enabled: true
  tmp:
    enabled: true


