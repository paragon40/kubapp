<!DOCTYPE html>
<html>
<head>
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🔗 URL Shortener</h1>

    <input id="url" placeholder="Enter long URL" />
    <button onclick="shorten()">Shorten</button>

    <div id="result"></div>

    <hr/>

    <button onclick="loadAll()">Load All URLs</button>
    <pre id="list"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
