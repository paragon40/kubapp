
service:
  name: metrics

app:
  port: 8080
  appUser: metric_app
  healthPath: /health
  livePath: /live
  basePath: /

deploy:
  env: dev
  containerUid: 10009


storage:
  volumes:
    - name: metrics
      emptyDir: {}

  volumeMounts:
    - name: metruc
      mountPath: /data

features:
  topVolume:
    enabled: false
  tmp:
    enabled: false

