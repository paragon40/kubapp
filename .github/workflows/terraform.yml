name: Terraform Provision

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to run
        required: true
        type: choice
        options: [apply, destroy]

      env:
        description: Environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

concurrency:
  group: terraform-${{ github.event.inputs.env }}
  cancel-in-progress: false


# =========================================================
# INFRA PLAN
# =========================================================
jobs:
  infra_plan:
    if: ${{ github.event.inputs.action == 'apply' }}
    name: Infra - Plan
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform + SOPS
        uses: hashicorp/setup-terraform@v3

      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup AGE
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Terraform Init (Infra)
        working-directory: iac/infra
        run: terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Generate tfvars (Infra)
        working-directory: iac/infra
        run: sops -d envs/${ENV}/${ENV}.tfvars.enc > infra.tfvars

      - name: Terraform Plan (Infra)
        working-directory: iac/infra
        run: terraform plan -out=infra.plan -var-file=infra.tfvars


# =========================================================
# INFRA APPROVAL
# =========================================================
  infra_approve:
    if: ${{ github.event.inputs.action == 'apply' && github.event.inputs.env == 'prod' }}
    name: Infra - Approval
    needs: infra_plan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download Infra Plan
        uses: actions/download-artifact@v4
        with:
          name: infra-plan

      - name: Show Plan
        run: terraform show infra.plan


# =========================================================
# INFRA APPLY
# =========================================================
  infra_apply:
    if: ${{ github.event.inputs.action == 'apply' }}
    name: Infra - Apply
    needs: infra_approve
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform + SOPS
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Init
        working-directory: iac/infra
        run: terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Load tfvars
        working-directory: iac/infra
        run: sops -d envs/${ENV}/${ENV}.tfvars.enc > infra.tfvars

      - name: Apply Infra
        working-directory: iac/infra
        run: terraform apply -auto-approve -var-file=infra.tfvars


# =========================================================
# K8S PLAN
# =========================================================
  k8s_plan:
    if: ${{ github.event.inputs.action == 'apply' }}
    name: K8s - Plan
    needs: infra_apply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform + SOPS
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Init K8s
        working-directory: iac/k8s
        run: terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Generate tfvars (K8s)
        working-directory: iac/k8s
        run: sops -d envs/${ENV}/${ENV}.tfvars.enc > k8s.tfvars

      - name: Plan K8s
        working-directory: iac/k8s
        run: terraform plan -out=k8s.plan -var-file=k8s.tfvars


# =========================================================
# K8S APPROVAL
# =========================================================
  k8s_approve:
    if: ${{ github.event.inputs.action == 'apply' && github.event.inputs.env == 'prod' }}
    name: K8s - Approval
    needs: k8s_plan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Show Plan
        run: terraform show k8s.plan


# =========================================================
# K8S APPLY
# =========================================================
  k8s_apply:
    if: ${{ github.event.inputs.action == 'apply' }}
    name: K8s - Apply
    needs: k8s_approve
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform + AWS
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Init
        working-directory: iac/k8s
        run: terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Load tfvars
        working-directory: iac/k8s
        run: sops -d envs/${ENV}/${ENV}.tfvars.enc > k8s.tfvars

      - name: Apply K8s
        working-directory: iac/k8s
        run: terraform apply -auto-approve -var-file=k8s.tfvars


# =========================================================
# DESTROY (FULL CLEAN PATH)
# =========================================================
  destroy:
    if: ${{ github.event.inputs.action == 'destroy' }}
    name: Destroy (K8s → Infra)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform + SOPS
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Destroy K8s
        working-directory: iac/k8s
        run: |
          terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"
          sops -d envs/${ENV}/${ENV}.tfvars.enc > k8s.tfvars
          terraform destroy -auto-approve -var-file=k8s.tfvars

      - name: Destroy Infra
        working-directory: iac/infra
        run: |
          terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"
          sops -d envs/${ENV}/${ENV}.tfvars.enc > infra.tfvars
          terraform destroy -auto-approve -var-file=infra.tfvars

