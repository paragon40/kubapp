name: Terraform Provision

on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to run
        required: true
        type: choice
        options: [apply, destroy]

      env:
        description: Environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.event.inputs.env }}
  cancel-in-progress: false


# =========================================================
# INFRA PLAN
# =========================================================
jobs:
  infra_plan:
    if: ${{ github.event.inputs.action == 'apply' }}
    name: Infra - Plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Oidc issue
        run: echo $ACTIONS_ID_TOKEN_REQUEST_TOKEN

      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup AGE key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: iac/infra
        run: terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Terraform Validate
        working-directory: iac/infra
        run: terraform validate

      - name: Load tfvars (infra)
        working-directory: iac/infra
        run: sops -d envs/${ENV}/infra.tfvars.enc > infra.tfvars

      - name: Terraform Plan
        working-directory: iac/infra
        run: terraform plan -out=infra.plan -var-file=infra.tfvars

      - name: Upload Infra Plan
        uses: actions/upload-artifact@v4
        with:
          name: infra-plan-${{ github.event.inputs.env }}
          path: iac/infra/infra.plan


# =========================================================
# INFRA APPROVAL (PROD ONLY)
# =========================================================
  infra_approve:
    if: ${{ github.event.inputs.action == 'apply' && github.event.inputs.env == 'prod' }}
    name: Infra - Approval
    needs: infra_plan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: infra-plan-${{ github.event.inputs.env }}
          path: infra-plan

      - name: Show Plan
        run: terraform show infra-plan/infra.plan


# =========================================================
# INFRA APPLY
# =========================================================
  infra_apply:
    name: Infra - Apply
    needs: infra_plan
    if: ${{ github.event.inputs.action == 'apply' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup AGE key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Init
        working-directory: iac/infra
        run: terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Load tfvars
        working-directory: iac/infra
        run: sops -d envs/${ENV}/infra.tfvars.enc > infra.tfvars

      - name: Apply Infra
        working-directory: iac/infra
        run: terraform apply -auto-approve -var-file=infra.tfvars


# =========================================================
# K8S PLAN
# =========================================================
  k8s_plan:
    if: ${{ github.event.inputs.action == 'apply' }}
    name: K8s - Plan
    needs: infra_apply
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup AGE key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Init K8s
        working-directory: iac/k8s
        run: terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Validate K8s
        working-directory: iac/k8s
        run: terraform validate

      - name: Load tfvars (k8s)
        working-directory: iac/k8s
        run: sops -d envs/${ENV}/k8s.tfvars.enc > k8s.tfvars

      - name: Plan K8s
        working-directory: iac/k8s
        run: terraform plan -out=k8s.plan -var-file=k8s.tfvars

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: k8s-plan-${{ github.event.inputs.env }}
          path: iac/k8s/k8s.plan


# =========================================================
# K8S APPROVAL (PROD ONLY)
# =========================================================
  k8s_approve:
    if: ${{ github.event.inputs.action == 'apply' && github.event.inputs.env == 'prod' }}
    name: K8s - Approval
    needs: k8s_plan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: k8s-plan-${{ github.event.inputs.env }}
          path: k8s-plan

      - name: Show Plan
        run: terraform show k8s-plan/k8s.plan


# =========================================================
# K8S APPLY
# =========================================================

  k8s_apply:
    name: K8s - Apply
    needs: k8s_plan
    if: ${{ github.event.inputs.action == 'apply' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup AGE key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Init
        working-directory: iac/k8s
        run: terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Load tfvars
        working-directory: iac/k8s
        run: sops -d envs/${ENV}/k8s.tfvars.enc > k8s.tfvars

      - name: Apply K8s
        working-directory: iac/k8s
        run: terraform apply -auto-approve -var-file=k8s.tfvars


# =========================================================
# DESTROY (K8S → INFRA)
# =========================================================
  destroy:
    if: ${{ github.event.inputs.action == 'destroy' }}
    name: Destroy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup AGE key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: Set ENV
        run: echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Destroy K8s
        working-directory: iac/k8s
        run: |
          set -euo pipefail
          terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"
          terraform validate
          sops -d envs/${ENV}/k8s.tfvars.enc > k8s.tfvars
          terraform destroy -auto-approve -var-file=k8s.tfvars

      - name: Extract cluster metadata
        working-directory: iac/infra
        run: |
          set -euo pipefail
          terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"
          echo "CLUSTER_NAME=$(terraform output -raw cluster_name)" >> $GITHUB_ENV
          echo "ENV=$(terraform output -raw env)" >> $GITHUB_ENV
          echo "PROJECT=$(terraform output -raw project)" >> $GITHUB_ENV

      - name: Ensure Clean For k8s resources
        run: bash scripts/delete_leftovers.sh
        env:
          ENV: ${{ env.ENV }}
          CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
          PROJECT: ${{ env.PROJECT }}
          AWS_REGION: us-east-1

      - name: Destroy Infra
        working-directory: iac/infra
        run: |
          set -euo pipefail
          terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"
          terraform validate
          sops -d envs/${ENV}/infra.tfvars.enc > infra.tfvars
          terraform destroy -auto-approve -var-file=infra.tfvars

      - name: Wipe Never-expire Logs Groups
        run: bash scripts/cleanup_logs.sh

      - name: Verify Cleanup
        run: bash scripts/verify_cleanup.sh

      - name: Finally
        run: echo "✅ $CLUSTER_NAME Terraform Workflow Passed!"

