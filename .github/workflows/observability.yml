name: Chaos Observability Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  issues: write

jobs:
  generate-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. Issue burst (REAL webhook event)
      # ------------------------------------------------------------
      - name: Create Issue Burst
        uses: actions/github-script@v7
        with:
          script: |
            for (let i = 0; i < 3; i++) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Chaos Issue ${Date.now()}-${i}`,
                body: "Auto-generated observability load test"
              });
            }

      # ------------------------------------------------------------
      # 2. Git activity (REAL push events ONLY)
      # ------------------------------------------------------------
      - name: Create Git Activity Burst
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          BRANCH="chaos-${RANDOM}"

          git checkout -b $BRANCH

          echo "$(date)" >> chaos.txt
          echo "event=$BRANCH" >> chaos.txt

          git add chaos.txt
          git commit -m "chaos: generate observability signal"
          git push origin $BRANCH

      # ------------------------------------------------------------
      # 3. Release (REAL release event)
      # ------------------------------------------------------------
      - name: Create Release Tag
        run: |
          TAG="v0.0.${GITHUB_RUN_NUMBER}"
          git tag $TAG
          git push origin $TAG

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: Chaos Release ${{ github.run_number }}

      # ------------------------------------------------------------
      # 4. Self signal (workflow_run metric already handled)
      # ------------------------------------------------------------
      - name: Emit Workflow Activity Event
        run: |
          echo "workflow simulation running..."
          sleep 2
          echo "done"

