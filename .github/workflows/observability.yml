name: Chaos Observability Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. Create Issue (generates issues webhook)
      # ------------------------------------------------------------
      - name: Create Issue Burst
        uses: actions/github-script@v7
        with:
          script: |
            for (let i = 0; i < 3; i++) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Chaos Issue ${Date.now()}-${i}`,
                body: "Auto-generated observability load test"
              });
            }

      # ------------------------------------------------------------
      # 2. Create Pull Request (generates PR webhook)
      # ------------------------------------------------------------
      - name: Create PR
        run: |
          git checkout -b chaos-branch-${RANDOM}

          echo "timestamp=$(date)" >> chaos.txt
          git add chaos.txt

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git commit -m "chaos: generate PR metrics"
          git push origin HEAD

      - name: Open Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Chaos PR " + new Date().toISOString(),
              head: "chaos-branch-" + Math.floor(Math.random() * 100000),
              base: "main",
              body: "Auto-generated PR for observability testing"
            });

      # ------------------------------------------------------------
      # 3. Create Release (generates release webhook)
      # ------------------------------------------------------------
      - name: Create Tag + Release
        run: |
          TAG="v0.0.${RANDOM}"
          git tag $TAG
          git push origin $TAG

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: Chaos Release ${{ github.run_number }}

      # ------------------------------------------------------------
      # 4. Trigger Workflow Run metric (self-observability)
      # ------------------------------------------------------------
      - name: Emit Workflow Activity Event
        run: |
          echo "Simulating workflow activity burst..."
          sleep 3
          echo "done"

