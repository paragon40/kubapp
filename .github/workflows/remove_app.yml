name: Remove Orphan Apps

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Optional manual override (leave empty for auto reconciliation)"
        required: false
      env:
        description: Environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

  push:
    branches:
      - main
    paths:
      - "envs/**"
      - "gitops/ingress/**"

permissions:
  contents: write

concurrency:
  group: using-commit
  cancel-in-progress: false

jobs:
  remove:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Safety checks
        run: |
          set -euo pipefail

          ENV="${{ github.event.inputs.env || 'dev' }}"

          echo "ENV=$ENV"

          # HARD BLOCK PROD AUTO DELETION ON PUSH
          if [[ "${{ github.event_name }}" == "push" && "$ENV" == "prod" ]]; then
            echo "❌ PROD automatic cleanup blocked on push"
            exit 1
          fi

      - name: Resolve mode
        id: mode
        run: |
          if [[ "${{ github.event.inputs.services }}" != "" ]]; then
            echo "mode=manual" >> $GITHUB_OUTPUT
          else
            echo "mode=auto" >> $GITHUB_OUTPUT
          fi

      # RECONCILIATION ENGINE
      - name: Remove Orphan Apps
        run: |
          set -euo pipefail

          ENV="${{ github.event.inputs.env || 'dev' }}"
          ING_FILE="gitops/ingress/${ENV}/values.yaml"

          echo "=============================="
          echo " ORPHAN APP CLEANUP ENGINE"
          echo " ENV: $ENV"
          echo " MODE: ${{ steps.mode.outputs.mode }}"
          echo "=============================="

          # extract valid apps from ingress (source of truth)
          VALID_APPS=$(yq '.services[].name' "$ING_FILE")

          echo "Valid apps from ingress:"
          echo "$VALID_APPS"
          echo ""

          # get deployed apps
          APP_DIRS=$(ls envs/$ENV || true)

          for app in $APP_DIRS; do

            APP_PATH="envs/$ENV/$app"

            # must be folder with values.yaml
            if [[ ! -f "$APP_PATH/values.yaml" ]]; then
              continue
            fi

            # CHECK IF IN INGRESS (STRICT MATCH)
            if echo "$VALID_APPS" | grep -qx "$app"; then
              echo "KEEP: $app exists in ingress"
              continue
            fi

            echo "ORPHAN DETECTED: $app"

            if [[ "$ENV" == "prod" ]]; then
              echo "❌ BLOCKED: cannot delete $app in prod"
              continue
            fi

            echo "Deleting FULL app folder: $APP_PATH"

            rm -rf "$APP_PATH"

          done

      - name: Check Ingress
        run: |
          set -euo pipefail

          echo "Validating ingress files..."

          for f in gitops/ingress/*/values.yaml; do
            yq '.' "$f" > /dev/null
          done

          echo "✅ Validation passed"

      - name: Validate GitOps
        run: bash scripts/validate_gitops.sh

      - name: Commit changes
        run: |
          set -euo pipefail
          DIR="gitops"
          MSG="[REMOVE]: services (${{ inputs.services }}) in ${{ inputs.env }}"
          bash scripts/commit.sh "$DIR" "$MSG"

      - name: Confirm Failute
        if: failure()
        run: |
          echo "❌ Workflow Didnt Complete.."

