name: Remove Orphan Apps

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Optional manual override (leave empty for auto reconciliation)"
        required: false
      env:
        description: Environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

  push:
    branches:
      - main
    paths:
      - "gitops/envs/**"
      - "gitops/ingress/**"

permissions:
  contents: write

concurrency:
  group: using-commit
  cancel-in-progress: false

jobs:
  remove:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Safety checks
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.env || 'dev' }}"

          echo "ENV=$ENV"

          if [[ "${{ github.event_name }}" == "push" && "$ENV" == "prod" ]]; then
            echo "❌ PROD automatic cleanup blocked on push"
            exit 1
          fi

      - name: Resolve mode
        id: mode
        run: |
          if [[ "${{ github.event.inputs.services }}" != "" ]]; then
            echo "mode=manual" >> $GITHUB_OUTPUT
          else
            echo "mode=auto" >> $GITHUB_OUTPUT
          fi

      - name: Remove Orphan Apps
        run: |
          set -euo pipefail

          ENV="${{ github.event.inputs.env || 'dev' }}"
          ING_FILE="gitops/ingress/${ENV}/values.yaml"
          APP_BASE="gitops/envs/$ENV"

          echo "=============================="
          echo " ORPHAN APP CLEANUP ENGINE"
          echo " ENV: $ENV"
          echo " MODE: ${{ steps.mode.outputs.mode }}"
          echo "=============================="

          VALID_APPS=$(yq '.services[].name' "$ING_FILE")

          echo "Valid apps:"
          echo "$VALID_APPS"
          echo ""

          ########################################
          # MANUAL MODE
          ########################################
          if [[ "${{ steps.mode.outputs.mode }}" == "manual" ]]; then

            RAW="${{ github.event.inputs.services }}"
            SERVICES=$(echo "$RAW" | tr ',' ' ' | xargs -n1 | sort -u)

            for app in $SERVICES; do

              APP_PATH="$APP_BASE/$app"

              echo ""
              echo "Checking manual delete: $app"

              if [[ ! -d "$APP_PATH" ]]; then
                echo "SKIP: not found $APP_PATH"
                continue
              fi

              if echo "$VALID_APPS" | grep -qx "$app"; then
                echo "BLOCKED: exists in ingress"
                continue
              fi

              if [[ "$ENV" == "prod" ]]; then
                echo "BLOCKED: prod manual delete"
                continue
              fi

              echo "Deleting: $APP_PATH"
              rm -rf "$APP_PATH"

            done

            exit 0
          fi

          ########################################
          # AUTO MODE (RECONCILIATION)
          ########################################
          if [[ ! -d "$APP_BASE" ]]; then
            echo "No env folder: $APP_BASE"
            exit 0
          fi

          APP_DIRS=$(ls "$APP_BASE" || true)

          for app in $APP_DIRS; do

            APP_PATH="$APP_BASE/$app"

            if [[ ! -f "$APP_PATH/values.yaml" ]]; then
              continue
            fi

            if echo "$VALID_APPS" | grep -qx "$app"; then
              echo "KEEP: $app"
              continue
            fi

            echo "ORPHAN: $app"

            if [[ "$ENV" == "prod" ]]; then
              echo "BLOCKED: prod delete"
              continue
            fi

            echo "Deleting: $APP_PATH"
            rm -rf "$APP_PATH"

          done

      - name: Check Ingress
        run: |
          set -euo pipefail
          for f in gitops/ingress/*/values.yaml; do
            yq '.' "$f" > /dev/null
          done

      - name: Validate GitOps
        run: bash scripts/validate_gitops.sh

      - name: Commit changes
        run: |
          set -euo pipefail
          ENV="${{ github.event.inputs.env }}"
          MSG="[REMOVE-APP]: orphan cleanup in $ENV"
          DIR="gitops/envs"
          bash scripts/commit.sh "$DIR" "$MSG"

      - name: Confirm Failure
        if: failure()
        run: echo "❌ Workflow failed"
