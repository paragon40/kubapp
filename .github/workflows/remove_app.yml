name: Remove App

on:
  workflow_dispatch:
    inputs:
      service:
        required: true
      env:
        description: Environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  contents: write

jobs:
  remove:
    uses: ./.github/workflows/runner.yml
    with:
      script: scripts/remove_app.sh
      args: "${{ inputs.service }} ${{ inputs.env }}"

