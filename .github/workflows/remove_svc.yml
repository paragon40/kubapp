name: Remove Service From Ingress

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Services to remove (space or comma separated, e.g. chatbot nodejsapp or chatbot,nodejsapp)"
        required: true
      env:
        description: "Environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: write

concurrency:
  group: using-commit
  cancel-in-progress: false

jobs:
  remove-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Export variables
        run: |
          echo "SERVICES=${{ github.event.inputs.services }}" >> $GITHUB_ENV
          echo "ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV

      - name: Remove service from ingress values
        run: |
          set -euo pipefail
          RAW="$SERVICES"

          CLEANED=$(echo "$RAW" \
            | tr ',' ' ' \
            | xargs -n1 \
            | sed '/^$/d' \
            | sort -u)

          if [[ -z "$CLEANED" ]]; then
            echo "❌ No services provided"
            exit 1
          fi

          echo "Services to remove:"
          echo "$CLEANED"

          while read -r svc; do
            [[ -z "$svc" ]] && continue
            echo "Removing $svc from ingress..."
            bash scripts/register_new_svc.sh remove "$svc" "$ENV"
          done <<< "$CLEANED"

      - name: Validate ingress YAML
        run: |
          set -euo pipefail
          yq e '.' "gitops/ingress/${ENV}/values.yaml" > /dev/null

      - name: Validate GitOps
        run: |
          set -euo pipefail
          bash scripts/validate_gitops.sh

      - name: Commit changes
        run: |
          set -euo pipefail
          MSG="[REMOVE-SVC]: removed services from ingress (${ENV})"
          bash scripts/commit.sh "gitops/ingress" "$MSG"

      - name: Done
        run: |
          echo "✅ Requested services removed from ingress."
          echo "This commit will automatically trigger remove_app.yml to delete orphaned app directories."
