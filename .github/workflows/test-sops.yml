name: SOPS Encrypt + Decrypt Test

on:
  workflow_dispatch:
  push:
    paths:
      - "gitops/secrets/**"

jobs:
  test-sops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install tools
      # -----------------------------
      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/

      # -----------------------------
      # Setup AGE private key (IMPORTANT)
      # -----------------------------
      - name: Setup SOPS AGE key
        run: |
          mkdir -p config/sops/age

          printf "%s\n" "${{ secrets.AGE_PRIVATE_KEY }}" > config/sops/age/keys.txt

          chmod 600 config/sops/age/keys.txt

          echo "SOPS_AGE_KEY_FILE=config/sops/age/keys.txt" >> $GITHUB_ENV

      # -----------------------------
      # Decrypt test
      # -----------------------------
      - name: Show time
        run: |
          echo "$(date)"

      - name: Debug SOPS key loading
        run: |
          sops --version
          echo "Checking key file format..."
          cat config/sops/age/keys.txt | head -c 50

      - name: Decrypt SOPS file
        run: |
          echo "🔓 Decrypting..."

          sops -d gitops/secrets/github-repo-secret.yaml > decrypted.yaml

      # -----------------------------
      # Validate YAML correctness
      # -----------------------------
      - name: Validate YAML schema
        run: |
          kubeconform -strict decrypted.yaml
