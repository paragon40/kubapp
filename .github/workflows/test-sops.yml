name: SOPS Encryption Test

on:
  workflow_dispatch:
  push:
    paths:
      - "gitops/secrets/**"

jobs:
  test-sops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Install tools
      # -----------------------------
      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # -----------------------------
      # Setup AGE key (FIXED)
      # -----------------------------
      - name: Setup AGE key
        run: |
          mkdir -p ~/.config/sops/age

          cat <<EOF > ~/.config/sops/age/keys.txt
${{ secrets.AGE_PRIVATE_KEY }}
EOF

          chmod 600 ~/.config/sops/age/keys.txt

          echo "SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt" >> $GITHUB_ENV

      # -----------------------------
      # Encrypt (FIXED - NO grep, NO multiline bug)
      # -----------------------------
      - name: Encrypt secret
        run: |
          sops -e --age "${{ secrets.AGE_PUBLIC_KEY }}" \
            gitops/secrets/github-repo-secret.yaml > secret.yaml.enc

      # -----------------------------
      # Decrypt test
      # -----------------------------
      - name: Decrypt secret
        run: |
          echo "🔓 Decrypting..."
          sops -d secret.yaml.enc > decrypted.yaml

      # -----------------------------
      # Validate YAML
      # -----------------------------
      - name: Validate Kubernetes YAML
        run: |
          echo "📦 Validating manifest..."
          cat decrypted.yaml
          kubectl apply --dry-run=client -f decrypted.yaml
