name: Test Docker build

on:
  workflow_dispatch:
    inputs:
      folder:
        required: true
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/${{ github.event.inputs.folder }}
          file: ./docker/${{ github.event.inputs.folder }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ github.event.inputs.folder }}:latest
            ${{ secrets.DOCKER_USER }}/${{ github.event.inputs.folder }}:${{ github.sha }}

      - name: Image pushed successfully
        run: echo "Docker image for ${{ github.event.inputs.folder }} built and pushed successfully"

