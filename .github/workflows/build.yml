name: Build and Push Docker Images

on:
  push:
    paths:
      - "docker/**"

  pull_request:
    paths:
      - "docker/**"

  workflow_dispatch:
    inputs:
      mode:
        description: Build mode
        required: false
        default: cached
        type: choice
        options:
          - cached
          - fresh

      env:
        description: Env mode
        required: false
        default: dev
        type: choice
        options:
          - dev
          - prod

      service:
        description: "Optional single service build (empty = all)"
        required: false
        default: ""

####################################################
# PREPARE MATRIX
####################################################
jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Generate dynamic matrix
        id: set-matrix
        run: |
          MANUAL_SERVICE="${{ github.event.inputs.service }}"

          if [ -n "$MANUAL_SERVICE" ]; then
            echo "Manual build mode: $MANUAL_SERVICE"
            SERVICES=$(echo "[\"$MANUAL_SERVICE\"]" | jq -c '.')
          else
            SERVICES=$(find docker -mindepth 1 -maxdepth 1 -type d -not -path "*/\.*" -printf '%f\n' \
              | sort \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "matrix={\"service\":$SERVICES}" >> $GITHUB_OUTPUT

          ####################################################
          # PRESERVED LOGIC (FIXED COUNT BUG ONLY)
          ####################################################
          if [ "$SERVICES" = "[]" ]; then
            echo "No services found in docker/"
            exit 1
          else
            COUNT=$(echo "$SERVICES" | jq -r '.[]' | wc -l)
            echo "Total Services found in docker directory: $COUNT"
          fi

####################################################
# BUILD JOB
####################################################
  build:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.export.outputs.env }}

    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    env:
      REGISTRY: docker.io
      IMAGE_NAMESPACE: ${{ secrets.DOCKER_USER }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID_GITHUB }}
          private_key: ${{ secrets.APP_PRIVATE_KEY_GITHUB }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: paragon40/kubapp
          token: ${{ steps.app-token.outputs.token }}

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login $REGISTRY \
            -u "${{ secrets.DOCKER_USER }}" --password-stdin

      ####################################################
      # LOAD SOURCE OF TRUTH (FIXED ONLY)
      ####################################################
      - name: Load service metadata to github Reg
        run: |
          set -euo pipefail

          SERVICE="${{ matrix.service }}"
          CONTEXT="docker/$SERVICE"

          APP_FILE=$(find "$CONTEXT" -maxdepth 1 -type f \
            \( -name "kubapp.yaml" -o -name "kubapp.yml" \) \
            -print -quit)

          SECRET_FILE=$(find "$CONTEXT" -maxdepth 1 -type f \
            \( -name "secrets.yaml" -o -name "secrets.yml" -o -name "secret.yaml" -o -name "secret.yml" \) \
            -print -quit)

          SERVICE_NAME="$SERVICE"
          PORT="80"

          ENV="${{ github.event.inputs.env }}"
          ENV="${ENV:-dev}"
          NO_VARS=true
          NO_SECRETS=true

          # ensure strict mode safety
          : "${NO_SECRETS:=true}"

          if [[ -n "$APP_FILE" && -s "$APP_FILE" ]]; then
            echo "Using app file: $APP_FILE"

            SERVICE_NAME=$(yq e '.service.name // strenv(SERVICE)' "$APP_FILE")
            PORT=$(yq e '.app.port // 80' "$APP_FILE")
            ENV=$(yq e '.deploy.env // strenv(ENV)' "$APP_FILE")

            VAR_COUNT=$(yq e '.runtime.env // {} | length' "$APP_FILE")
            if [[ "$VAR_COUNT" -gt 0 ]]; then
              NO_VARS=false
            fi
          else
            echo "No app file found → using defaults"
          fi

          echo "NO_VARS=$NO_VARS" >> $GITHUB_ENV

          if [[ -n "${SECRET_FILE:-}" && -s "$SECRET_FILE" ]]; then
            NO_SECRETS=false
          fi

          echo "NO_SECRETS=$NO_SECRETS" >> $GITHUB_ENV
          echo "ENV=$ENV" >> $GITHUB_ENV
          TS="$(date +%s)"
          TM="$(date +%Y-%m-%d_%H-%M-%S)"
          NAMESPACE="$ENV"
          IMAGE1="$IMAGE_NAMESPACE/$SERVICE:$GITHUB_SHA-$TS"
          IMAGE2="$IMAGE_NAMESPACE/$SERVICE:latest"
          echo "IMAGE1=$IMAGE1" >> $GITHUB_ENV
          echo "IMAGE2=$IMAGE2" >> $GITHUB_ENV

          DIR="test/$ENV/$SERVICE"
          echo "DIR=$DIR" >> $GITHUB_ENV
          mkdir -p "$DIR"
          FILE="$DIR/$SERVICE.json"

          echo "================================="
          echo "SERVICE_NAME: $SERVICE_NAME"
          echo "BUILD_NAME   : $SERVICE"
          echo "IMAGE1       : $IMAGE1"
          echo "IMAGE2       : $IMAGE2"
          echo "CONTEXT     : $CONTEXT"
          echo "REGISTRY    : $REGISTRY"
          echo "FILE        : $FILE"
          echo "================================="

          jq -n \
            --arg service "$SERVICE_NAME" \
            --arg context "$CONTEXT" \
            --arg image1 "$IMAGE1" \
            --arg image2 "$IMAGE2" \
            --arg tag "$GITHUB_SHA" \
            --arg registry "$REGISTRY" \
            --arg namespace "$NAMESPACE" \
            --arg env "$ENV" \
            --arg port "$PORT" \
            --arg no_vars "$NO_VARS" \
            --arg no_secrets "$NO_SECRETS" \
            --arg created_at "$TM" \
            '{
              service: $service,
              context: $context,
              image1: $image1,
              image2: $image2,
              tag: $tag,
              registry: $registry,
              namespace: $namespace,
              env: $env,
              port: $port,
              NO_VARS: $no_vars,
              NO_SECRETS: $no_secrets,
              CREATED_AT: $created_at
            }' > "$FILE"

          echo "Generated manifest for $SERVICE"

      ####################################################
      # BUILD
      ####################################################
      - name: Build Docker image
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MODE=${MODE:-cached}

          IMAGE1="${{ env.IMAGE1 }}"
          IMAGE2="${{ env.IMAGE2 }}"
          CONTEXT="docker/${{ matrix.service }}"

          if [ "$MODE" = "fresh" ]; then
            echo "Fresh build (no cache)"
            docker build --no-cache -t "$IMAGE1" "$CONTEXT"
            docker build --no-cache -t "$IMAGE2" "$CONTEXT"
          else
            echo "Cached build"
            docker build -t "$IMAGE1" "$CONTEXT"
            docker build -t "$IMAGE2" "$CONTEXT"
          fi

      ####################################################
      # PUSH
      ####################################################
      - name: Push image
        run: |
          IMAGE1="${{ env.IMAGE1 }}"
          IMAGE2="${{ env.IMAGE2 }}"
          docker push "$IMAGE1"
          docker push "$IMAGE2"

      - name: Upload registry artifacts
        uses: actions/upload-artifact@v4
        with:
          name: registry-${{ matrix.service }}
          path: "${{ env.DIR }}"


      - name: Export env for commit job
        id: export
        run: |
          ENV="${{ env.ENV }}"
          echo "env=$ENV" >> $GITHUB_OUTPUT

####################################################
# COMMIT JOB
####################################################
  commit:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID_GITHUB }}
          private_key: ${{ secrets.APP_PRIVATE_KEY_GITHUB }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Confirm content of Each file in original folder
        run: |
          echo "===== ORIGINAL REGISTRY ====="
          find gitops/registry -type f | while read -r file; do
            echo "=========== $file ==========="
            cat "$file"
            echo
          done

      - name: Download registry artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name:  Ensure artifact Not empty
        run: |
          set -euo pipefail
          if [ ! -d artifacts ]; then
            echo "❌ artifacts directory missing"
            exit 1
          fi

          LEN=$(find artifacts -type f | wc -l)
          if [[ "$LEN" -eq 0 ]]; then
            echo "❌ Problem!, Downloaded Artifact is Empty o"
            exit 1
          fi
          echo "✅ Artifact contains $LEN files"

      - name: Debug downloaded artifacts
        run: |
          echo "=== ARTIFACT TREE ==="
          find artifacts -type f -print

      - name: Reset registry folder
        env:
          ENV: ${{ needs.build.outputs.env }}
        run: |
          rm -rf gitops/registry
          echo " Old registry removed, New one recreating.."
          NEW_DIR="gitops/registry/$ENV"
          mkdir -p  "$NEW_DIR"
          echo "NEW_DIR=$NEW_DIR" >> $GITHUB_ENV

      - name: Rebuild registry from artifacts
        run: |
          set -euo pipefail
          NEW_DIR="${{ env.NEW_DIR }}"

          echo "Copying JSON files into registry..."
          find artifacts -type f -name "*.json" | while read -r file; do
            echo "→ $file"
            cp "$file" "$NEW_DIR"
          done

      - name: Validate registry
        run: |
          NEW_DIR="${{ env.NEW_DIR }}"
          COUNT=$(find "$NEW_DIR" -type f -name "*.json" | wc -l)

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ Registry is empty after rebuild"
            exit 1
          fi

          echo "✅ Registry rebuilt with $COUNT files"


      - name: Confirm New Folder content of Each file
        run: |
          NEW_DIR="${{ env.NEW_DIR }}"
          echo "===== DOWNLOADED REGISTRY ====="
          find "$NEW_DIR" -type f | while read -r file; do
            echo "=========== $file ==========="
            cat "$file"
            echo
          done

      - name: Commit Metadata
        run: |
          set -euo pipefail
          bash scripts/commit.sh
