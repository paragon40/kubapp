name: Build and Push Docker Images

on:
  pull_request:
    paths:
      - "docker/**"

  workflow_dispatch:
    inputs:
      mode:
        description: Build mode
        required: false
        default: cached
        type: choice
        options:
          - cached
          - fresh
      env:
        description: Env mode
        required: false
        default: dev
        type: choice
        options:
          - dev
          - prod

####################################################
# PREPARE MATRIX
####################################################
jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Generate dynamic matrix
        id: set-matrix
        run: |
          SERVICES=$(find docker -mindepth 1 -maxdepth 1 -type d -not -path "*/\.*" -printf '%f\n' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "matrix={\"service\":$SERVICES}" >> $GITHUB_OUTPUT

          if [ "$SERVICES" = "[]" ]; then
            echo "No services found in docker/"
            exit 1
          fi

####################################################
# BUILD JOB
####################################################
  build:
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    env:
      REGISTRY: docker.io
      IMAGE_NAMESPACE: ${{ secrets.DOCKER_USER }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      ####################################################
      # LOGIN
      ####################################################
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login $REGISTRY \
            -u "${{ secrets.DOCKER_USER }}" --password-stdin

      ####################################################
      # BUILD
      ####################################################
      - name: Build Docker image
        run: |
          MODE="${{ github.event.inputs.mode }}"
          MODE=${MODE:-cached}

          IMAGE="$IMAGE_NAMESPACE/${{ matrix.service }}:${{ github.sha }}"
          CONTEXT="docker/${{ matrix.service }}"

          if [ "$MODE" = "fresh" ]; then
            echo "Fresh build (no cache)"
            docker build --no-cache -t "$IMAGE" "$CONTEXT"
          else
            echo "Cached build"
            docker build -t "$IMAGE" "$CONTEXT"
          fi

      ####################################################
      # PUSH
      ####################################################
      - name: Push image
        run: |
          IMAGE="$IMAGE_NAMESPACE/${{ matrix.service }}:${{ github.sha }}"
          docker push "$IMAGE"

      ####################################################
      # METADATA
      ####################################################
      - name: Generate build metadata
        run: |
          mkdir -p build-meta

          IMAGE="$IMAGE_NAMESPACE/${{ matrix.service }}:${{ github.sha }}"

          echo "{
            \"service\": \"${{ matrix.service }}\",
            \"image\": \"$IMAGE\",
            \"tag\": \"${{ github.sha }}\",
            \"registry\": \"$REGISTRY\",
            \"namespace\": \"$IMAGE_NAMESPACE\",
            \"env\": \"${{ github.event.inputs.env || 'dev' }}\"
          }" > build-meta/${{ matrix.service }}.json

      ####################################################
      # ARTIFACT UPLOAD
      ####################################################
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: build-meta/${{ matrix.service }}.json

