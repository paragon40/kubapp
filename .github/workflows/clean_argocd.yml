name: Argocd Cluster Cleanup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type YES to confirm cluster cleanup"
        required: true
        default: "NO"

permissions:
  id-token: write
  contents: read

concurrency:
  group: cluster-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      ####################################################
      # SAFETY GATE
      ####################################################
      - name: Safety confirmation
        run: |
          set -euo pipefail

          if [[ "${{ github.event.inputs.confirm }}" != "YES" ]]; then
            echo "❌ Cleanup aborted. You must type YES to proceed."
            exit 1
          fi

          echo "⚠️ CLEANUP CONFIRMED — PROCEEDING"

      ####################################################
      # CHECKOUT
      ####################################################
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------------
      # 2. AWS credentials
      # --------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check AWS credentials
        run: aws sts get-caller-identity

      # --------------------------------
      # 3. Setup kubeconfig (EKS access)
      # --------------------------------
      - name: Setup kubeconfig
        run: |
          set -e

          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name kubapp-dev

          export KUBECONFIG=~/.kube/config

          echo "✅ kubeconfig created"

          kubectl cluster-info

      - name: Check
        run: |
          set -e
          echo "=== kubeconfig ==="
          cat ~/.kube/config || true
          echo "=== auth test ==="
          kubectl auth can-i get pods -A || true

      ####################################################
      # INSTALL KUBECTL
      ####################################################
      - name: Install kubectl
        run: |
          set -euo pipefail

          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      ####################################################
      # AWS / KUBECONFIG (OPTIONAL HOOK)
      ####################################################
      - name: Configure Kubernetes access
        run: |
          set -euo pipefail

          echo "Configure kubeconfig here if needed"
          kubectl version --client

      ####################################################
      # RUN CLEANUP SCRIPT (UNCHANGED)
      ####################################################
      - name: Run cluster cleanup
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          bash scripts/clean_cluster.sh

      ####################################################
      # POST CHECK (VERIFY CLEAN STATE)
      ####################################################
      - name: Verify cluster state after cleanup
        run: |
          set -euo pipefail

          echo "Checking remaining resources..."

          kubectl get ns
          kubectl get ingress -A || true
          kubectl get applicationsets -n argocd || true

          echo "✅ Cleanup verification completed"

