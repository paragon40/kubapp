name: GitOps Verification

on:
  workflow_run:
    workflows: ["Update GitOps"]
    types:
      - completed

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: paragon40/kubapp
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
          https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts

      # =========================
      # VALIDATE ARTIFACTS EXIST
      # =========================
      - name: Validate artifacts
        run: |
          set -e

          FILES=$(find artifacts -name "*.json")

          if [ -z "$FILES" ]; then
            echo "No artifacts found"
            exit 1
          fi

      # =========================
      # VERIFY VIA ARGOCD CLI
      # =========================
      - name: Verify ArgoCD apps
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          set -e

          for file in $(find artifacts -name "*.json"); do
            SERVICE=$(jq -r .service "$file")
            ENV=$(jq -r .env "$file")

            APP_NAME="${SERVICE}-${ENV}"

            echo "Checking $APP_NAME"
            argocd app get $APP_NAME \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN \
              || {
              echo "App not found: $APP_NAME"
              exit 1
            }

            argocd app get $APP_NAME --refresh \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN

            argocd app wait $APP_NAME \
              --health \
              --timeout 180 \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN

          done

      # =========================
      # ROLLBACK (SAFE VERSION)
      # =========================
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed. Roll back safely"

          git fetch --tags

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found."
            exit 1
          fi

