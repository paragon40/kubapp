name: GitOps Verification

on:
  workflow_run:
    workflows: ["Update GitOps"]
    types:
      - completed

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: paragon40/kubapp
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
          https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Retrieve Correct ENV
        run: |
          set -euo pipefail
          bash scripts/get_state_file.sh

      - name: validate files
        run: |
          set -e

          FILES=$(find gitops/registry/$ENV -name "*.json")

          if [ -z "$FILES" ]; then
            echo "No Registry File found"
            exit 1
          fi

      - name: Verify ArgoCD apps
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          set -e

          for file in $(find gitops/registry/$ENV -name "*.json"); do
            SERVICE=$(jq -r .service "$file")
            ENV=$(jq -r .env "$file")

            APP_NAME="${SERVICE}-${ENV}"
            echo "Checking $APP_NAME"

            argocd app get $APP_NAME \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN \
              || {
              echo "App not found: $APP_NAME"
              exit 1
            }

            argocd app get $APP_NAME --refresh \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN

            argocd app wait $APP_NAME \
              --health \
              --timeout 180 \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN

          done

      - name: Suggest Rollback on failure
        if: failure()
        run: |
          git fetch --tags
          ENV=$(find artifacts -name "*.json" | head -1 | xargs jq -r .env)
          PREVIOUS_TAG=$(git tag --list "stable-${ENV}-*" --sort=-creatordate | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found."
            exit 1
          fi
          echo "Deployment failed. Roll back safely with: $PREVIOUS_TAG"


      - name: Create stable deployment tag
        run: |
          ENV=$(find artifacts -name "*.json" | head -1 | xargs jq -r .env)
          TAG="stable-${ENV}-$(date +%Y%m%d-%H%M%S)"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch --tags

          git tag -a "$TAG" -m "Stable deployment snapshot: $TAG || commit=$(git rev-parse HEAD)"
          git push origin "$TAG"

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "✅ Created stable tag: $TAG"


      - name: Save deployment snapshot metadata
        env:
          TAG: ${{ env.TAG }}
        run: |
          mkdir -p snapshot

          echo "{
            \"tag\": \"$TAG\",
            \"commit\": \"$(git rev-parse HEAD)\",
            \"time\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"
          }" > snapshot/state.json

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-snapshot
          path: snapshot/state.json

      - name: Veriyfy Complete
        run: echo "✅ Gitops System Safe"

