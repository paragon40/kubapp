name: Runtime Verification

on:
  workflow_run:
    workflows: ["Runtime Image Update"]
    types:
      - completed

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID_GITHUB }}
          private_key: ${{ secrets.APP_PRIVATE_KEY_GITHUB }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: paragon40/kubapp
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
          https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Retrieve Correct ENV
        run: |
          set -euo pipefail
          STATE_FILE="gitops/state/current.json"
          if [[ ! -f "$STATE_FILE" || ! -s "$STATE_FILE" ]]; then
            echo "❌ State File: $STATE_FILE is Missing or Empty."
            exit 1
          fi

          STATE_ENV=$(jq -r '.env' "$STATE_FILE")
          if [[ -z "$STATE_ENV" || "$STATE_ENV" == "null" ]]; then
            echo "❌ ENV Source from state file Empty"
            exit 1
          fi
          echo "Detected ENV: $STATE_ENV"
          echo "ENV=$ENV" >> $GITHUB_ENV

      - name: validate files
        run: |
          set -e
          ENV1="${{ env.ENV}}"
          echo "ENV1=$ENV1" >> $GITHU_ENV
          FILES=$(find gitops/registry/$ENV1 -name "*.json")

          if [ -z "$FILES" ]; then
            echo "No Registry File found"
            exit 1
          fi

      - name: Verify ArgoCD apps
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          set -e
          ENV1="${{ env.ENV1}}"
          for file in $(find gitops/registry/$ENV1 -name "*.json"); do
            SERVICE=$(jq -r .service "$file")
            ENV=$(jq -r .env "$file")

            APP_NAME="${SERVICE}-${ENV}"
            echo "Checking $APP_NAME"

            argocd app get $APP_NAME \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN \
              || {
              echo "App not found: $APP_NAME"
              exit 1
            }

            argocd app get $APP_NAME --refresh \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN

            argocd app wait $APP_NAME \
              --health \
              --timeout 180 \
              --server $ARGOCD_SERVER \
              --auth-token $ARGOCD_AUTH_TOKEN

          done

      - name: Suggest Rollback on failure
        if: failure()
        run: |
          ENV1="${{ env.ENV1}}"
          git fetch --tags
          ENV=$(find gitops/registry/$ENV1 -name "*.json" | head -1 | xargs jq -r .env)
          PREVIOUS_TAG=$(git tag --list "stable-${ENV}-*" --sort=-creatordate | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found."
            exit 1
          fi
          echo "Deployment failed. Roll back safely with: $PREVIOUS_TAG"

      - name: Veriyfy Complete
        run: echo "✅ Gitops System Safe"

