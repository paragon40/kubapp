name: Activate Pipeline

on:
  workflow_dispatch:
    inputs:
      env:
        required: true
        default: dev
        type: choice
        options: [dev, prod]

      mode:
        required: true
        default: full
        type: choice
        options: [full, build, deploy, cleanup]

permissions:
  contents: write
  actions: write

concurrency:
  group: activate-pipeline-${{ inputs.env }}
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch context
        run: |
          echo "ENV=${{ inputs.env }}"
          echo "MODE=${{ inputs.mode }}"

      - name: Trigger Build
        if: ${{ inputs.mode == 'full' || inputs.mode == 'build' }}
        run: |
          gh workflow run build.yml -f env=${{ inputs.env }}
          gh workflow run validate_gitops.yml -f env=${{ inputs.env }}

      - name: Trigger Deploy
        if: ${{ inputs.mode == 'full' || inputs.mode == 'deploy' }}
        run: |
          gh workflow run setup_argocd.yml -f env=${{ inputs.env }}
          gh workflow run verify_runtime.yml -f env=${{ inputs.env }}

      - name: Trigger Cleanup
        if: ${{ inputs.mode == 'full' || inputs.mode == 'cleanup' }}
        run: |
          gh workflow run clean_argocd.yml -f env=${{ inputs.env }}

