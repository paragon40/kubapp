name: Validate & Reconcile Ingress

on:
  workflow_run:
    workflows:
      - "Add New App (GitOps Provisioning)"
      - "Remove App"
    types: [completed]

  push:
    paths:
      - "gitops/registry/**"
      - "gitops/ingress/**"

  workflow_dispatch:
    inputs:
      env:
        description: Environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

      repair_mode:
        description: Auto-repair ingress drift
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

      auto_register:
        description: Auto-register missing services into ingress
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

      strict:
        description: Fail pipeline on drift
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: ingress-reconcile
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    env:
      ENV: ${{ github.event.inputs.env || 'dev' }}
      FILE: gitops/ingress/${{ github.event.inputs.env || 'dev' }}/values.yaml
      REPAIR_MODE: ${{ github.event.inputs.repair_mode || 'false' }}
      AUTO_REGISTER: ${{ github.event.inputs.auto_register || 'false' }}
      STRICT: ${{ github.event.inputs.strict || 'true' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      ####################################################
      # LOAD DATASETS
      ####################################################
      - name: Load registry and ingress services
        id: load
        run: |
          set -euo pipefail

          echo "Loading registry..."
          if [[ "${{ github.event_run }}" == "workflow_run" ]]; then
            STATE_FILE="gitops/state/current.json"
            if [[ ! -f "$STATE_FILE" || ! -s "$STATE_FILE" ]]; then
              echo "❌ State File: $STATE_FILE is Missing or Empty."
              exit 1
            fi

            STATE_ENV=$(jq -r '.env' "$STATE_FILE")
            if [[ -z "$STATE_ENV" || "$STATE_ENV" == "null" ]]; then
              echo "❌ ENV Source from state file Empty"
              exit 1
            fi
            echo "Detected ENV: $STATE_ENV"
            echo "ENV=$STATE_ENV" >> github_ENV
          fi

          REGISTRY=$(find gitops/registry/$ENV -name "*.json" \
            -exec jq -r '.service' {} \; | sort -u)

          echo "Loading ingress..."
          INGRESS=$(yq e '.services[].name' "$FILE" | sort -u)

          echo "REGISTRY<<EOF" >> $GITHUB_OUTPUT
          echo "$REGISTRY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "INGRESS<<EOF" >> $GITHUB_OUTPUT
          echo "$INGRESS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      ####################################################
      # COMPUTE DRIFT
      ####################################################
      - name: Compute drift
        id: diff
        run: |
          set -euo pipefail

          REGISTRY="${{ steps.load.outputs.REGISTRY }}"
          INGRESS="${{ steps.load.outputs.INGRESS }}"

          MISSING=$(comm -23 <(echo "$REGISTRY") <(echo "$INGRESS") || true)
          INVALID=$(comm -23 <(echo "$INGRESS") <(echo "$REGISTRY") || true)

          echo "MISSING<<EOF" >> $GITHUB_OUTPUT
          echo "$MISSING" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "INVALID<<EOF" >> $GITHUB_OUTPUT
          echo "$INVALID" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "================ DRIFT REPORT ================"
          echo "Missing in ingress (registry → ingress):"
          echo "$MISSING"
          echo ""
          echo "Invalid in ingress (ingress → registry):"
          echo "$INVALID"
          echo "=============================================="

      ####################################################
      # AUTO REGISTER MISSING SERVICES (SAFE)
      ####################################################
      - name: Register missing services into ingress
        if: steps.diff.outputs.MISSING != '' && env.AUTO_REGISTER == 'true'
        run: |
          set -euo pipefail

          echo " Auto-registering missing services..."

          for svc in ${{ steps.diff.outputs.MISSING }}; do
            echo "Registering: $svc"
            bash scripts/register_new_svc.sh "$svc" "$ENV"
          done

      ####################################################
      # HANDLE INVALID SERVICES
      ####################################################
      - name: Handle invalid services
        run: |
          set -euo pipefail

          INVALID="${{ steps.diff.outputs.INVALID }}"

          if [ -z "$INVALID" ]; then
            echo "✅ No invalid services found"
            exit 0
          fi

          echo "⚠️ Invalid services detected:"
          echo "$INVALID"

          if [ "$REPAIR_MODE" = "true" ]; then
            echo " Repair mode enabled — removing invalid services..."

            for svc in $INVALID; do
              echo "Removing: $svc"
              bash scripts/register_new_svc.sh remove "$svc" "$ENV"
            done
          else
            echo "❌ Strict mode enabled — failing pipeline"
            exit 1
          fi

      ####################################################
      # FINAL VALIDATION
      ####################################################
      - name: Validate final ingress state
        run: |
          set -euo pipefail

          COUNT=$(yq e '.services | length' "$FILE")

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ Ingress is empty"
            exit 1
          fi

          echo "✅ Ingress valid with $COUNT services"

      ####################################################
      # DEBUG OUTPUT
      ####################################################
      - name: Show final ingress
        run: |
          echo "========== FINAL INGRESS =========="
          cat "$FILE"

