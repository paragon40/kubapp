name: Unlock tf Key

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to run
        required: true
        type: choice
        options: [infra, k8s]

      env:
        description: Environment
        required: true
        type: choice
        options: [dev, prod]

      lock_id:
        description: Terraform Lock ID
        required: true
        type: string

jobs:
  unlock:
    name: Unlock Terraform State
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run unlock script
        run: |
          chmod +x scripts/unlock_tf.sh
          ./scripts/unlock_tf.sh \
            "${{ github.event.inputs.stack }}" \
            "${{ github.event.inputs.env }}" \
            "${{ github.event.inputs.lock_id }}"

      - name: Done
        run: echo "✅ Unlock completed"

