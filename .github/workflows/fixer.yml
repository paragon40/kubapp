name: KubApp Fix Workflow

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment (dev/prod/staging)"
        required: true
        default: dev

      commands:
        description: "Commands to run (newline separated)"
        required: true
        default: |
          terraform state list
          kubectl get ns

jobs:
  fix-runner:
    runs-on: ubuntu-latest

    env:
      ENV: ${{ github.event.inputs.env }}
      COMMANDS: ${{ github.event.inputs.commands }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Init Terraform
        working-directory: iac/k8s
        run: |
          terraform init -reconfigure -backend-config="envs/${ENV}/backend.hcl"

      - name: Run Fix Commands
        working-directory: iac/k8s
        shell: bash
        run: |
          set -euo pipefail

          echo "==================================="
          echo " KubApp FIX WORKFLOW"
          echo " ENV: $ENV"
          echo "==================================="

          while IFS= read -r cmd; do
            [[ -z "$cmd" ]] && continue

            echo ""
            echo ">> RUNNING: $cmd"
            echo "-----------------------------------"

            eval "$cmd"

          done <<< "$COMMANDS"

      - name: Final Cluster State
        run: |
          kubectl get ns
          kubectl get ingress -A || true

