name: Argocd And Gitops Bootstrap

on:
  workflow_dispatch:
    inputs:
      env:
        description: Environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: development

    steps:
      # --------------------------------
      # 1. Checkout repo
      # --------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------------
      # 2. AWS credentials
      # --------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check AWS credentials
        run: aws sts get-caller-identity

      - name: Install SOPS
        run: |
          curl -L -o sops https://github.com/getsops/sops/releases/download/v3.9.0/sops-v3.9.0.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin/sops

      - name: Setup AGE key
        run: |
          mkdir -p config/sops/age
          echo "${{ secrets.AGE_PRIVATE_KEY }}" > config/sops/age/keys.txt
          chmod 600 config/sops/age/keys.txt

      # --------------------------------
      # 3. Setup kubeconfig (EKS access)
      # --------------------------------
      - name: Setup kubeconfig
        run: |
          set -e

          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name kubapp-dev

          export KUBECONFIG=~/.kube/config

          echo "✅ kubeconfig created"

          kubectl cluster-info

      - name: Check
        run: |
          set -e
          echo "=== kubeconfig ==="
          cat ~/.kube/config || true
          echo "=== auth test ==="
          kubectl auth can-i get pods -A || true

      - name: Check Readiness
        run: bash scripts/check_cluster.sh

      # --------------------------------
      # 4. Apply ArgoCD GitHub App repo secret
      # --------------------------------
      - name: Apply ArgoCD GitHub App secret
        run: |
          set -e

          SECRET_FILE=$(find gitops/secrets -type f -name "github-repo-secret.yaml.enc" | head -n 1)
          DECRYPTED="decrypted.yaml"

          if [ -n "$SECRET_FILE" ]; then
            echo "Decrypting secret file: $SECRET_FILE"
            sops -d "$SECRET_FILE" > "$DECRYPTED"
            kubectl apply --validate=false -f "$DECRYPTED"
            echo "✅ ArgoCD secret applied from Sops"
          else
            echo "❌ No encrypted secret files found. Generating one"
            mkdir -p gitops/secrets
            BASE_FILE="gitops/secrets/github-repo-secret.yaml"
            python3 scripts/apply_argo_secret.py
            kubectl apply --validate=false -f "$BASE_FILE"
            echo "✅ ArgoCD secret applied from Script"
          fi
        env:
           PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY_GITHUB }}
           APP_ID: ${{ secrets.APP_ID_GITHUB }}
           REPO_URL: ${{ secrets.REPO_URL }}
           BASE_FILE: "$BASE_FILE"

      # --------------------------------
      # 5. Verify ArgoCD resources
      # --------------------------------
      - name: Verify ArgoCD namespace access
        run: kubectl get ns argocd

      - name: Verify secret exists
        run: kubectl get secret -n argocd | grep github || true

      # --------------------------------
      # 5. Apply ArgoCD resources
      # --------------------------------
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID_GITHUB }}
          private_key: ${{ secrets.APP_PRIVATE_KEY_GITHUB }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Ensure helm is isntalled
        run: |
          if ! command -v helm >/dev/null 2>&1; then
            sudo snap install helm --classic
          fi

      - name: Install Metrics Server for HPA
        run: |
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
          helm upgrade --install metrics-server metrics-server/metrics-server \
            -n kube-system \
            --create-namespace

      - name: Make script executable
        run: chmod +x scripts/bootstrap_gitops.sh

      - name: Run GitOps bootstrap
        run: bash scripts/bootstrap_gitops.sh

      - name: Ensure Route53 is synced
        env:
          ENV: "${{ github.event.inputs.env }}"
          DOMAIN: "${{ secrets.DOMAIN }}"
        run: |
          set -euio pipefail
          for i in {1..6}; do
            echo "Setting up route53 for Domain if new..."
            if bash scripts/sync_route53.sh; then
              echo "✅ Success on attempt $i"
              break
            else
              echo "ALB not ready yet, retrying..."
              sleep 5
            fi
            echo "❌ Route53 sync failed after retries"
            exit 1
          done
