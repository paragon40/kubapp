name: Argocd Setup

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: development

    steps:
      # --------------------------------
      # 1. Checkout repo
      # --------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------------
      # 2. AWS credentials
      # --------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --------------------------------
      # 3. Setup kubeconfig (EKS access)
      # --------------------------------
      - name: Setup kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name kubapp-dev

      # --------------------------------
      # 4. Apply ArgoCD GitHub App repo secret
      # --------------------------------
      - name: Apply ArgoCD GitHub App secret
        run: |
          if kubectl apply -f gitops/argocd/github-repo-secret.yaml; then
            echo "ArgoCD secret applied from file"
          else
            echo "File missing — generating secret"
            python3 scripts/argo_secret.py
            kubectl apply -f gitops/argocd/github-repo-secret.yaml
          fi
        env:
          PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY_GITHUB }}
          APP_ID: ${{ secrets.APP_ID_GITHUB }}
          REPO_URL: "https://github.com/paragon40/kubapp.git"

      # --------------------------------
      # 5. Verify ArgoCD resources
      # --------------------------------
      - name: Verify ArgoCD namespace access
        run: kubectl get ns argocd

      - name: Verify secret exists
        run: kubectl get secret -n argocd | grep github || true
