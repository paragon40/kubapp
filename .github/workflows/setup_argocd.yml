name: Argocd Setup

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # 1. Configure AWS credentials
      # -----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------
      # 2. Setup kubeconfig for EKS
      # -----------------------------
      - name: Setup kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name kubapp-dev

      # -----------------------------
      # 3. Create ArgoCD secret
      # -----------------------------
      - name: Create ArgoCD GitHub App secret
        run: |
          kubectl create secret generic github-app-repo \
            -n argocd \
            --from-literal=url=https://github.com/paragon40/kubapp.git \
            --from-literal=githubAppID=3440391 \
            --from-file=githubAppPrivateKey=<(printf "%s" "$APP_PRIVATE_KEY") \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY_GITHUB }}
