name: Sys Monitor Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WEBHOOK_URL: ${{ secrets.SYS_MONITOR_WEBHOOK }}

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-test-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Simulation
        run: |
          echo "Building project..."
          sleep 5

      - name: Create Demo Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Demo Issue - " + new Date().toISOString(),
              body: "Generated automatically by Sys Monitor pipeline."
            })

      - name: Create Release Tag
        id: tag
        run: |
          TAG="v$(date +'%Y.%m.%d.%H%M%S')"
          git tag $TAG
          git push origin $TAG
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}

      - name: Trigger Synthetic Webhook Events
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "X-GitHub-Event: workflow_run" \
            -H "Content-Type: application/json" \
            -d "{
              \"repository\": {
                \"full_name\": \"${{ github.repository }}\"
              },
              \"workflow_run\": {
                \"name\": \"Sys Monitor Demo Pipeline\",
                \"status\": \"completed\",
                \"conclusion\": \"success\",
                \"run_started_at\": \"$(date -u -d '2 minutes ago' +%Y-%m-%dT%H:%M:%SZ)\",
                \"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }
            }"
