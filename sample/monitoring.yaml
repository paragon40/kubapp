namespace: dev

ingress:
  name: kubapp-dev-monitoring-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true

  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/d33fdba8-5a0c-4be6-9cc7-9a7b45be19f4

  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared

services:

  - name: grafana
    enabled: true
    port: 80
    backend:
      service: kube-prometheus-stack-grafana
      port: 80

  - name: prometheus
    enabled: true
    port: 80
    backend:
      service: kube-prometheus-stack-prometheus
      port: 80

  - name: alertmanager
    enabled: true
    port: 80
    backend:
      service: kube-prometheus-stack-alertmanager
      port: 80

  - name: argocd
    enabled: true
    port: 80
    backend:
      service: argocd-server
      port: 80
