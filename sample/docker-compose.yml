#version: "3.8"

services:
  github_exporter:
    build: ./exporters/github
    container_name: github-exporter
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - github-db:/data
    environment:
      - EVENT_DB_PATH=/data/github_events.db

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.external-url=http://rundailytest.duckdns.org/prometheus/
      - --web.route-prefix=/
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP= false
      - GF_AUTH_ANONYMOUS_ENABLED= true
      - GF_AUTH_DISABLE_LOGIN_FORM= true
      - GF_AUTH_ANONYMOUS_ORG_ROLE= Admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/github-overview.json
      - GF_SERVER_ROOT_URL=http://rundailytest.duckdns.org/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

  sre-engine:
    build:
      context: ./exporters/github/src
      dockerfile: sre_engine/Dockerfile
    container_name: sre-engine
    command: python -m sre_engine.worker
    ports:
      - "8000:8000"
    depends_on:
      - github_exporter
    volumes:
      - github-db:/data
    environment:
      - EVENT_DB_PATH=/data/github_events.db

volumes:
  github-db:
