replicas: 3

image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent

service:
  name: user-service
  port: 80

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

health:
  path: /user
  initialDelaySeconds: 10
  periodSeconds: 10

env: []
