apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubapp-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/timzapone/kubapp-project.git
    targetRevision: main
    path: gitops/infra/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

