apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/timzapone/kubapp-project.git
    targetRevision: main
    path: gitops/apps/user/chart

  destination:
    server: https://kubernetes.default.svc
    namespace: users

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    syncWave: "1"
