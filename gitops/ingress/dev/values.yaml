namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: kubapp.rundailytest.site
  enableSubdomainRouting: true
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /health
    listenPorts: '[{"HTTP":80}]'
services:
  - name: user
    enabled: true
    port: 80
  - name: admin
    enabled: true
    port: 80
  - name: weather
    enabled: true
    port: 80
  - name: nodejsapp
    enabled: true
    port: 80
  - name: urlshortener
    enabled: true
    port: 80
