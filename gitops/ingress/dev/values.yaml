namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/4be5e107-d195-4274-8226-701c8c712279
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /health
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: user
    enabled: true
    port: 80
  - name: admin
    enabled: true
    port: 80
  - name: weather
    enabled: true
    port: 80
  - name: nodejsapp
    enabled: true
    port: 80
  - name: urlshortener
    enabled: true
    port: 80
