namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/69c0aa59-1525-4efa-86ae-ea8e88a04b09
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /health
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: weather
    enabled: true
    port: 80
  - name: metrics
    port: 80
    enabled: true
  - name: admin
    port: 80
    enabled: true
  - name: nodejsapp
    port: 80
    enabled: true
  - name: urlshortener
    port: 80
    enabled: true
  - name: chatbot
    port: 80
    enabled: true
