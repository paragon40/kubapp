namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: rundailytest.duckdns.org
  enableSubdomainRouting: true
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /health
    listenPorts: '[{"HTTP":80}]'
services:
  - name: user
  - name: admin
  - name: weather
  - name: nodejsapp
  - name: urlshortener
