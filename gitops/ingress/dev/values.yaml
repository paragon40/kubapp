namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/f2a5aa62-bb18-41af-b57d-7bc86e0b8b51
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /health
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: weather
    enabled: true
    port: 80
  - name: metrics
    port: 80
    enabled: true
  - name: admin
    port: 80
    enabled: true
  - name: nodejsapp
    port: 80
    enabled: true
  - name: urlshortener
    port: 80
    enabled: true
  - name: chatbot
    port: 80
    enabled: true
