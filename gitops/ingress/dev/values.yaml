namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/f7b8b4b6-57e6-445a-9ca2-401fa1f48abc
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: weather
    enabled: true
    port: 80
  - name: metrics
    enabled: true
    port: 80
  - name: admin
    port: 80
    enabled: true
  - name: urlshortener
    enabled: true
    port: 80
