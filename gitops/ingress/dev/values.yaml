namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/80f99b6e-0b3e-4313-ac6e-052e4b238d47
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: weather
    enabled: true
    port: 80
  - name: metrics
    enabled: true
    port: 80
  - name: admin
    port: 80
    enabled: true
  - name: urlshortener
    enabled: true
    port: 80
