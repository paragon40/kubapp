namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/a98757d4-69b3-4a6b-a01e-407622169dcc
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /health
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: weather
    enabled: true
    port: 80
  - name: urlshortener
    enabled: true
    port: 80
  - name: metrics
    port: 80
    enabled: true
  - name: chatbot
    port: 80
    enabled: true
