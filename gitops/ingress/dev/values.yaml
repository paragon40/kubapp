namespace: dev
ingress:
  name: kubapp-dev-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:532918215760:certificate/20533f0c-e4db-4d70-8990-7d0b66fcb421
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: weather
    enabled: true
    port: 80
  - name: metrics
    enabled: true
    port: 80
  - name: admin
    port: 80
    enabled: true
  - name: urlshortener
    enabled: true
    port: 80
