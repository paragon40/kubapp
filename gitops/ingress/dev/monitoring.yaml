namespace: monitoring
ingress:
  name: kubapp-monitoring-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/8d3c3fdf-2f22-4e46-9dd9-816fc8d51740
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: grafana
    enabled: true
    port: 80
    backend:
      service: kube-prometheus-stack-grafana
  - name: prometheus
    enabled: true
    port: 80
    backend:
      service: kube-prometheus-stack-prometheus
  - name: alertmanager
    enabled: true
    port: 80
    backend:
      service: kube-prometheus-stack-alertmanager
  - name: argocd
    enabled: true
    port: 80
    backend:
      service: argocd-server
  - name: metrics
    port: 80
    enabled: true
    backend:
      service: kube-prometheus-stack-alertmanager
  - name: urlshortener
    port: 80
    enabled: true
    backend:
      service: kube-prometheus-stack-alertmanager
  - name: weather
    port: 80
    enabled: true
    backend:
      service: kube-prometheus-stack-grafana
