namespace: monitoring
ingress:
  name: kubapp-monitoring-alb
  className: alb
  baseDomain: rundailytest.online
  enableSubdomainRouting: true
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/8d83b6f3-cab8-44fc-bed4-47267c6b2317
  annotations:
    scheme: internet-facing
    targetType: ip
    healthcheckPath: /
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: grafana
    enabled: true
    port: 80
    backend:
      service: kube-prometheus-stack-grafana
  - name: prometheus
    enabled: true
    port: 9090
    backend:
      service: kube-prometheus-stack-prometheus
  - name: alertmanager
    enabled: true
    port: 9093
    backend:
      service: kube-prometheus-stack-alertmanager
