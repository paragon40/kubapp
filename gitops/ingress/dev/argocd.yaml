namespace: argocd
ingress:
  name: kubapp-argocd-alb
  baseDomain: rundailytest.online
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/ca69ea0f-e4b6-4087-8ca9-abf7a3b68d2c
  className: alb
  enableSubdomainRouting: true
  annotations:
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: argocd
    enabled: true
    port: 80
    backend:
      service: argocd-server
