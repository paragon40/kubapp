namespace: argocd
ingress:
  name: kubapp-argocd-alb
  baseDomain: rundailytest.online
  certificateArn: arn:aws:acm:us-east-1:532918215760:certificate/88753851-e3e6-4911-94ce-7802a721aa41
  className: alb
  enableSubdomainRouting: true
  annotations:
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: argocd
    enabled: true
    port: 80
    backend:
      service: argocd-server
