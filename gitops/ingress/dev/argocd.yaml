namespace: argocd
ingress:
  name: kubapp-argocd-alb
  baseDomain: rundailytest.online
  certificateArn: arn:aws:acm:us-east-1:198200019771:certificate/83f60367-f0cb-4f29-b953-155dae9a4d79
  className: alb
  enableSubdomainRouting: true
  annotations:
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: argocd
    enabled: true
    port: 80
    backend:
      service: argocd-server
