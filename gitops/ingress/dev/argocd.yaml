namespace: argocd
ingress:
  name: kubapp-argocd-alb
  baseDomain: rundailytest.online
  certificateArn: arn:aws:acm:us-east-1:532918215760:certificate/334f0808-1897-4064-bdae-3b9a5541f185
  className: alb
  enableSubdomainRouting: true
  annotations:
    listenPorts:
      - HTTP: 80
      - HTTPS: 443
    group: kubapp-shared
services:
  - name: argocd
    enabled: true
    port: 80
    backend:
      service: argocd-server
