apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/paragon40/kubapp.git
    targetRevision: main
    path: gitops/ingress

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
