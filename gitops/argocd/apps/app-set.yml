apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kubapp-appset
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/paragon40/kubapp.git
        revision: main
        directories:
          - path: gitops/apps/*/chart

    - list:
        elements:
          - env: dev
          - env: prod

  template:
    metadata:
      name: "{{path.basename}}-{{env}}"

    spec:
      project: default

      source:
        repoURL: https://github.com/paragon40/kubapp.git
        targetRevision: main
        path: "{{path}}"

        helm:
          valueFiles:
            - ../../envs/{{env}}/{{path.basename}}.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
