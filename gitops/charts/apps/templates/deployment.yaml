apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.appName }}

  template:
    metadata:
      labels:
        app: {{ .Values.appName }}

    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.pod.runAsNonRoot | default true }}
        seccompProfile:
          type: {{ .Values.securityContext.pod.seccompProfile.type | default "RuntimeDefault" }}

      {{- if .Values.storage }}
      {{- if .Values.storage.volumes }}
      volumes:
{{ toYaml .Values.storage.volumes | indent 8 }}
      {{- end }}
      {{- end }}

      containers:
        - name: {{ .Values.appName }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.service.targetPort }}

          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          securityContext:
            runAsNonRoot: {{ .Values.securityContext.container.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.container.runAsUser | default 1000 }}
            allowPrivilegeEscalation: {{ .Values.securityContext.container.allowPrivilegeEscalation | default false }}
            readOnlyRootFilesystem: {{ .Values.securityContext.container.readOnlyRootFilesystem }}
            capabilities:
              drop:
{{ toYaml .Values.securityContext.container.capabilities.drop | indent 16 }}
          {{- if .Values.storage }}
          {{- if .Values.storage.volumeMounts }}
          volumeMounts:
{{ toYaml .Values.storage.volumeMounts | indent 12 }}
          {{- end }}
          {{- end }}

          {{- if .Values.probes.readiness }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | default "/" }}
              port: {{ default .Values.service.targetPort (dig "probes" "liveness" "httpGet" "port" .Values) }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}

          {{- if .Values.probes.liveness }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path | default "/" }}
              port: {{ default .Values.service.targetPort (dig "probes" "liveness" "httpGet" "port" .Values) }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}

          {{- if .Values.probes.startup }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path | default "/" }}
              port: {{ default .Values.service.targetPort (dig "probes" "startup" "httpGet" "port" .Values) }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          {{- end }}
