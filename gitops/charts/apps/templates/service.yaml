apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appName }}-service
  namespace: {{ .Values.namespace }}

  labels:
    app: {{ .Values.appName }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ .Values.appName }}

  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}

