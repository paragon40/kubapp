apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.annotations.scheme }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.annotations.targetType }}
    alb.ingress.kubernetes.io/listen-ports: '{{ .Values.ingress.annotations.listenPorts }}'
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.annotations.healthcheckPath }}
    alb.ingress.kubernetes.io/group.name: kubapp-shared

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:

    # Path-based routing
    - host: {{ .Values.ingress.baseDomain }}
      http:
        paths:
{{- range .Values.services }}
          - path: /{{ .name }}
            pathType: Prefix
            backend:
              service:
                name: {{ .name }}-service
                port:
                  number: 80
{{- end }}

{{- if .Values.ingress.enableSubdomainRouting }}
{{- range .Values.services }}

    # Subdomain routing
    - host: {{ .name }}.{{ $.Values.ingress.baseDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .name }}-service
                port:
                  number: 80

{{- end }}
{{- end }}
