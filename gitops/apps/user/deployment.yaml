apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: ingress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: codest40/edgeapp
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
