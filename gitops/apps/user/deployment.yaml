apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: user
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user
          image: nginx:stable
          ports:
            - containerPort: 80
