apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-hpa
  namespace: ingress

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70


#After HPA, natural next steps are:

#1. Metrics Server tuning
#2. Pod Disruption Budget (PDB)
#3. Liveness/Readiness probes
#4. Cluster Autoscaler (node scaling)
