apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-app
spec:
  replicas: {{ .Values.replicas }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: admin

  template:
    metadata:
      labels:
        app: admin

    spec:
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: admin
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 80

          # ======================
          # Resources
          # ======================
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          # ======================
          # Health Checks
          # ======================
          readinessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: 80
            initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
            periodSeconds: {{ .Values.health.periodSeconds }}

          livenessProbe:
            httpGet:
              path: {{ .Values.health.path }}
              port: 80
            initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
            periodSeconds: {{ .Values.health.periodSeconds }}

          # ======================
          # Environment Variables
          # ======================
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: "{{ .value }}"
            {{- end }}

          # ======================
          # Basic Security
          # ======================
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false


---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin
