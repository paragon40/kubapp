appName: metrics
namespace: dev
serviceAccount:
  create: true
  name: metrics-sa
  roleArn: arn:aws:iam::198200019771:role/kubapp-dev-app-pods-role
serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
replicaCount: 2
image:
  repository: paragon40/metrics_app
  tag: 614cf2aad475abfdfd5fdc85d391b445b107df57-1779115200
  pullPolicy: Always
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
env: {}
securityContext:
  pod:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  container:
    runAsNonRoot: true
    runAsUser: 10009
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
probes:
  readiness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    httpGet:
      path: /live
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 15
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  cpu: 70
  memory: 70
meta:
  staticFingerprint: 6eb65282886a0603f8c86255c84251d376fa95d72df49a6392d9bc346965da9f
  generatedAt: 2026-05-19T13:37:23Z
  source: build-pipeline
storage:
  volumes:
    - name: metrics
      emptyDir: {}
  volumeMounts:
    - name: metrics
      mountPath: /data
nodeSelector:
  compute: ec2
tolerations:
  - key: compute
    operator: Equal
    value: ec2
    effect: NoSchedule
