appName: metrics
namespace: dev
replicaCount: 2
image:
  repository: paragon40/metrics_app
  tag: ca36bfc10509d3785c3db75ae2e2f0dafab3c71f-1778225488
  pullPolicy: Always
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
env: {}
securityContext:
  pod:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  container:
    runAsUser: 10009
