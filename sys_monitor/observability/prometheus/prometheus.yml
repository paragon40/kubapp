global:
  scrape_interval: 5s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: "github-exporter"
    static_configs:
      - targets: ["github_exporter:3000"]


  - job_name: "sre-engine"
    static_configs:
      - targets: ["sre-engine:8000"]


  - job_name: "gitops-exporter"
    static_configs:
      - targets: ["gitops-exporter:9105"]


  - job_name: "codebase-exporter"
    static_configs:
      - targets: ["codebase-exporter:8080"]
